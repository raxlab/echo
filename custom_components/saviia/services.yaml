get_thies_data:
  name: "Get Thies Data"
  description: "Reads the configured THIES credentials and returns whether a sync or backup is needed."
  fields:
    ftp_port:
      name: FTP port override
      required: true
      selector:
        number:
          min: 1
          max: 65535
    ftp_host:
      name: FTP host override
      required: true
      selector:
        text:
    ftp_user:
      name: FTP user override
      required: true
      selector:
        text:
    ftp_password:
      name: FTP password override
      required: true
      selector:
        text:
    sharepoint_destination_path:
      name: SharePoint destination override
      description: "Defaults to the configured THIES AVG backup folder."
      required: false
      selector:
        text:

post_thies_data:
  name: "Post Thies Data"
  description: "Executes THIES backup and synchronization using the configured credentials."
  fields:
    ftp_port:
      name: FTP port override
      required: true
      selector:
        number:
          min: 1
          max: 65535
    ftp_host:
      name: FTP host override
      required: true
      selector:
        text:
    ftp_user:
      name: FTP user override
      required: true
      selector:
        text:
    ftp_password:
      name: FTP password override
      required: true
      selector:
        text:
    need_to_sync:
      name: Force sync flag
      required: false
      selector:
        boolean:
    need_to_backup:
      name: Force backup flag
      required: false
      selector:
        boolean:
    sharepoint_destination_path:
      name: SharePoint destination override
      required: false
      selector:
        text:
    ftp_server_folders_path:
      name: FTP server folders override
      required: false
      selector:
        object:
    local_backup_source_path:
      name: Local backup source override
      required: false
      selector:
        text:

detect_failures:
  name: "Detect failures from Thies Sensors"
  description: Check all the sensors at Thies Station, then use the results to produce a report analysing  possible sensor failures.
  fields: 
    local_backup_source_path:
        name: Relative path to the local backup directory.
        required: true
        selector:
          text:
    n_days:
      name: The number of days to analyse from today
      required: true
      selector:
        number:
          min: 1
          max: 90
    db_driver:
        name: ODBC Driver where the historical data from ODBC is retrieved
        required: false
        selector:
          text:
    db_host:
        name: Server where the ODBC is located.
        required: false
        selector:
          text:
    db_name:
        name: Name of the warehouse (SAVIIA Golden layer) in which the historical data is stored
        required: false
        selector:
          text:
    user:
        name: Username of the account that has access to the ODBC
        required: false
        selector:
          text:
    pwd:
        name: Password of the account that has access to the ODBC
        required: false
        selector:
          text:

export_files:
  name: "Export Files"
  description: "Synchronizes a local folder under the configured backup root with SharePoint."
  fields:
    local_folder_path:
      name: Local folder path
      description: "Relative folder under the configured backup root."
      required: true
      selector:
        text:
    sharepoint_destination_path:
      name: SharePoint destination override
      required: false
      selector:
        text:

get_netcamera_rates:
  name: "Get Camera Time Rates"
  description: "Retrieve time rates for photo capture and video recording from connected network cameras"
  fields:
    latitude:
      name: Latitude
      required: true
      selector:
        number:
          min: -90
          max: 90
    longitude:
      name: Longitude
      required: true
      selector:
        number:
          min: -180
          max: 180

update_task:
  name: Update a Discord Task
  description: Saviia provides this action for updating a message that had been sent in a Discord Channel
  fields:
    task:
      name: Task payload to update the Discord message
      required: true
      selector:
        object:
    completed:
      name: Completed attribute which defines if the Task was finished.
      required: true
      selector:
        boolean:

delete_task:
  name: Delete a Discord Task
  description: Saviia provides this action for deleting a message that had been sent in a Discord Channel
  fields:
    task_id:
      name: Task ID from Discord webhook channel
      required: true
      selector:
        text:

create_task:
  name: "Create Task"
  description: "Create a new task and send it to Discord via webhook"
  fields:
    task:
      name: Task payload
      required: true
      selector:
        object:
    images:
      name: Images
      description: "Base64 encoded images to attach"
      required: false

get_tasks:
  name: "Get Tasks"
  description: "Retrieves a list of tasks based on the provided parameters."
  fields:
    params:
      name: Parameters
      required: false
      selector:
        object:

get_pending_tasks:
  name: "Get pending Tasks"
  description: "It retrieves a list of incomplete tasks, which are sorted by deadline (overdue and on time), periodicity and priority"
  fields: 
    download: 
      name: Download attachments
      description: "Whether to download the attachments of the tasks or not"
      required: false
      selector:
        boolean:
    notify:
      name: Send an email notification
      description: "Whether to send an email notification with the list of pending tasks or not"
      required: false
      selector:
        boolean:

get_config_value:
  name: "Get Config Value"
  description: "Returns a whitelisted configuration value from the SAVIIA config entry"
  fields:
    key:
      name: Config key
      description: "Whitelisted config key to retrieve (for example: local_backup_source_path)"
      required: true
      selector:
        text: