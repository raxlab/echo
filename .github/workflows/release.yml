name: "Release"

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Optional tag to package, for example v7.6.8"
        required: false
        type: string
  release:
    types: [published]
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout the repository
        uses: actions/checkout@v4.2.2

      - name: Extract version from release
        env:
          RELEASE_TAG: ${{ inputs.release_tag }}
        run: |
          TAG_NAME="${RELEASE_TAG:-${GITHUB_REF_NAME}}"
          VERSION="${TAG_NAME#v}"
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "TAG_NAME=$TAG_NAME" >> $GITHUB_ENV

      - name: Update manifest version
        run: |
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          manifest = Path("custom_components/saviia/manifest.json")
          data = json.loads(manifest.read_text())
          data["version"] = os.environ["VERSION"]
          manifest.write_text(json.dumps(data, indent=4) + "\n")
          PY

      - name: Package the integration
        run: |
          zip -r "saviia-${VERSION}.zip" custom_components/saviia -x "custom_components/saviia/*.zip"

      - name: Upload the ZIP file to the release
        uses: softprops/action-gh-release@v2.2.2
        with:
          tag_name: ${{ env.TAG_NAME }}
          name: ${{ env.TAG_NAME }}
          files: saviia-${{ env.VERSION }}.zip
          generate_release_notes: true
